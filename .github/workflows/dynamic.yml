name: dynamic

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  statuses: write

jobs:
  submit-nuget:
    name: submit-nuget (dynamic)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Report package publishing policy
        run: |
          echo "This repository does not publish a NuGet package from CI."
          echo "Compatibility workflow retained so the existing required status check stays green."

      - name: Publish legacy required status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'dynamic / submit-nuget (dynamic)',
              description: 'NuGet publishing is not used in this repository.'
            });

      - name: Publish legacy required check run
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'dynamic / submit-nuget (dynamic)',
              head_sha: context.sha,
              status: 'completed',
              conclusion: 'success',
              output: {
                title: 'NuGet publishing is not used in this repository.',
                summary: 'This repository does not publish a NuGet package from CI.'
              }
            });
